<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근성 100% 앱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>A11y App</h1>
    </header>

    <main id="main-content">
        <section id="home" class="tab-content active">
            <h2>홈 탭</h2>
            <p>접근성 100% 예시 페이지입니다.</p>
        </section>
        
        <section id="category" class="tab-content">
            <h2>카테고리 탭</h2>
            <p>다양한 UI 예제를 모아둔 곳입니다.</p>
        </section>

        <section id="shorts" class="tab-content">
            <h2>쇼츠 탭</h2>
            <p>세로형 영상 접근성 예제입니다.</p>
        </section>

        <section id="search" class="tab-content">
            <h2>검색 탭</h2>
            <p>검색창 접근성 예제입니다.</p>
        </section>

        <section id="settings" class="tab-content">
            <h2>설정 탭</h2>
            <p>회원가입/로그인 및 설정입니다.</p>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="changeTab('home')" class="nav-btn active">홈</button>
        <button onclick="changeTab('category')" class="nav-btn">카테고리</button>
        <button onclick="changeTab('shorts')" class="nav-btn">쇼츠</button>
        <button onclick="changeTab('search')" class="nav-btn">검색</button>
        <button onclick="changeTab('settings')" class="nav-btn">설정</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
