<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>접근성 100% 쇼츠 플레이어</title>
  <link rel="stylesheet" href="./style.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- 스크린 리더용 라이브 리전 -->
  <div id="sr-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!-- 상단 글로벌 헤더 -->
  <header class="global-header">
    <h1 class="header-title">쇼츠</h1>
    <div class="header-actions">
      <button class="control-btn" aria-label="검색">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <button class="control-btn" aria-label="메뉴">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 홈 화면 -->
    <section id="home-view" class="view-section" aria-label="홈 화면">
      <div class="home-container">
        <h2 class="home-title" tabindex="-1">추천 동영상</h2>
        <div class="video-grid">
          <!-- 더미 비디오 카드 1 -->
          <article class="video-card" tabindex="0" role="link" aria-label="화려한 불꽃놀이와 축제, 조회수 1.2만회, 2일 전">
            <div class="video-thumbnail" aria-hidden="true"></div>
            <div class="video-info">
              <h3 class="video-card-title">화려한 불꽃놀이와 축제</h3>
              <p class="video-author">User_Name_01</p>
              <p class="video-meta">조회수 1.2만회 • 2일 전</p>
            </div>
          </article>
          <!-- 더미 비디오 카드 2 -->
          <article class="video-card" tabindex="0" role="link" aria-label="기계 속의 코끼리 꿈, 조회수 8천회, 1주 전">
            <div class="video-thumbnail" aria-hidden="true"></div>
            <div class="video-info">
              <h3 class="video-card-title">기계 속의 코끼리 꿈</h3>
              <p class="video-author">Creator_ABC</p>
              <p class="video-meta">조회수 8천회 • 1주 전</p>
            </div>
          </article>
          <!-- 더미 비디오 카드 3 -->
          <article class="video-card" tabindex="0" role="link" aria-label="빅 벅 바니 애니메이션, 조회수 5만회, 1개월 전">
            <div class="video-thumbnail" aria-hidden="true"></div>
            <div class="video-info">
              <h3 class="video-card-title">빅 벅 바니 애니메이션</h3>
              <p class="video-author">Blender</p>
              <p class="video-meta">조회수 5만회 • 1개월 전</p>
            </div>
          </article>
        </div>
      </div>
    </section>

    <!-- 쇼츠 화면 -->
    <section id="shorts-view" class="view-section hidden-view" aria-hidden="true">
      <div class="shorts-container" id="shorts-container" aria-label="쇼츠 동영상 목록" role="feed">
      
      <!-- Video Item 1 -->
      <article class="short-item" tabindex="-1" aria-labelledby="title-1">
        <!-- 검은 배경 플레이스홀더 (임시 더미) -->
        <div class="short-video-placeholder" aria-hidden="true"></div>
        
        <div class="short-overlay">
          <!-- 중앙: 재생/일시정지 버튼 -->
          <div class="center-controls">
            <button class="center-play-btn play-pause-btn" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
          </div>

          <div class="bottom-area">
            <!-- 하단 좌측: 프로필 및 텍스트 -->
            <div class="bottom-left">
              <div class="profile-area">
                <img src="https://via.placeholder.com/40/333333/FFFFFF?text=U1" alt="사용자1 프로필" class="profile-img">
                <span class="username">User_Name_01</span>
                <button class="follow-btn" aria-pressed="false" aria-label="구독">구독</button>
              </div>
              <div class="content-area">
                <h2 id="title-1" class="short-title">화려한 불꽃놀이와 축제</h2>
                <p class="short-desc">아름다운 야경과 함께하는 불꽃놀이 현장입니다.</p>
              </div>
            </div>
            
            <!-- 하단 우측: 액션 버튼 -->
            <div class="bottom-right">
              <button class="action-btn like-btn" aria-label="좋아요" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span class="action-text" aria-hidden="true">1.2만</span>
              </button>
              <button class="action-btn comment-btn" aria-label="댓글 달기">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <span class="action-text" aria-hidden="true">342</span>
              </button>
              <button class="action-btn more-btn" aria-label="더보기">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </article>

      <!-- Video Item 2 -->
      <article class="short-item" tabindex="-1" aria-labelledby="title-2">
        <div class="short-video-placeholder" aria-hidden="true"></div>
        <div class="short-overlay">
          <div class="center-controls">
            <button class="center-play-btn play-pause-btn" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
          </div>
          <div class="bottom-area">
            <div class="bottom-left">
              <div class="profile-area">
                <img src="https://via.placeholder.com/40/333333/FFFFFF?text=U2" alt="사용자2 프로필" class="profile-img">
                <span class="username">Creator_ABC</span>
                <button class="follow-btn" aria-pressed="false" aria-label="구독">구독</button>
              </div>
              <div class="content-area">
                <h2 id="title-2" class="short-title">기계 속의 코끼리 꿈</h2>
                <p class="short-desc">환상적인 3D 애니메이션 단편입니다.</p>
              </div>
            </div>
            <div class="bottom-right">
              <button class="action-btn like-btn" aria-label="좋아요" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span class="action-text" aria-hidden="true">8,421</span>
              </button>
              <button class="action-btn comment-btn" aria-label="댓글 달기">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <span class="action-text" aria-hidden="true">112</span>
              </button>
              <button class="action-btn more-btn" aria-label="더보기">
                <svg viewBox="0 0 24 24" fill="currentColor" class="action-icon"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </article>

    </div>
    </section>
  </main>
  
  <!-- 하단 네비게이션 바 -->
  <nav class="global-bottom-nav" aria-label="하단 메뉴">
    <button class="nav-btn active" aria-label="홈, 현재 선택됨" id="nav-home">
      <svg viewBox="0 0 24 24" fill="currentColor" class="nav-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="nav-text" aria-hidden="true">홈</span>
    </button>
    <button class="nav-btn" aria-label="카테고리">
      <svg viewBox="0 0 24 24" fill="currentColor" class="nav-icon"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/></svg>
      <span class="nav-text" aria-hidden="true">카테고리</span>
    </button>
    <button class="nav-btn" aria-label="쇼츠" id="nav-shorts">
      <svg viewBox="0 0 24 24" fill="currentColor" class="nav-icon"><path d="M18 7c0-.55-.45-1-1-1H7c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h10c.55 0 1-.45 1-1V7zm-7 8.5V8.5l5 3.5-5 3.5z"/></svg>
      <span class="nav-text" aria-hidden="true">쇼츠</span>
    </button>
    <button class="nav-btn" aria-label="검색">
      <svg viewBox="0 0 24 24" fill="currentColor" class="nav-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span class="nav-text" aria-hidden="true">검색</span>
    </button>
    <button class="nav-btn" aria-label="마이">
      <svg viewBox="0 0 24 24" fill="currentColor" class="nav-icon"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span class="nav-text" aria-hidden="true">마이</span>
    </button>
  </nav>

  <script defer src="./main.js"></script>
</body>
</html>
